<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manifest Özel Fan Testi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .quiz-container { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid #ff0055; text-align: center; width: 90%; max-width: 450px; box-shadow: 0 0 20px rgba(255, 0, 85, 0.3); }
        h2 { color: #ff0055; margin-bottom: 20px; }
        .options { display: grid; gap: 10px; }
        button { background: #333; color: #fff; border: 1px solid #444; padding: 15px; border-radius: 10px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #ff0055; color: #fff; font-weight: bold; transform: translateY(-2px); }
        .hidden { display: none; }
        .result-media { width: 100%; border-radius: 15px; margin-top: 20px; border: 2px solid #fff; }
        #final-text { font-size: 20px; margin-top: 15px; color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="q1">
        <h2>Soru 1</h2>
        <p>Manifest'in 1. yıla özel şarkısı hangisidir?</p>
        <div class="options">
            <button onclick="next(1, 2)">A) BAŞROL SENSİN</button>
            <button onclick="next(1, 2)">B) ZEHİR</button>
            <button onclick="next(1, 2)">C) HAYIR</button>
        </div>
    </div>

    <div id="q2" class="hidden">
        <h2>Soru 2</h2>
        <p>Manifest kaç üyeden oluşur?</p>
        <div class="options">
            <button onclick="next(2, 3)">A) 3</button>
            <button onclick="next(2, 3)">B) 5</button>
            <button onclick="next(2, 3)">C) 6</button>
        </div>
    </div>

    <div id="q3" class="hidden">
        <h2>Soru 3</h2>
        <p>Manifest'in mavi saçlı üyesi kimdir?</p>
        <div class="options">
            <button onclick="next(3, 4)">A) MİNA</button>
            <button onclick="next(3, 4)">B) ESİN</button>
            <button onclick="next(3, 4)">C) ZOKTAY</button>
        </div>
    </div>

    <div id="q4" class="hidden">
        <h2>Final Sorusu</h2>
        <p>En çok hangi üyeyi seviyorsun?</p>
        <div class="options">
            <button onclick="showFinal('mina')">MİNA</button>
            <button onclick="showFinal('esin')">ESİN</button>
            <button onclick="showFinal('zoktay')">ZOKTAY</button>
            <button onclick="showFinal('lidya')">LİDYA</button>
            <button onclick="showFinal('hilal')">HİLAL</button>
            <button onclick="showFinal('sueda')">SUEDA</button>
        </div>
    </div>

    <div id="result" class="hidden">
        <h2 id="res-title"></h2>
        <div id="media-content"></div>
        <p id="final-text"></p>
        <button onclick="location.reload()" style="margin-top:20px; font-size:12px; background:#444;">Testi Yeniden Çöz</button>
    </div>
</div>

<script>
    function next(current, next) {
        document.getElementById('q' + current).classList.add('hidden');
        document.getElementById('q' + next).classList.remove('hidden');
    }

    function showFinal(member) {
        document.getElementById('q4').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        
        const media = document.getElementById('media-content');
        const text = document.getElementById('final-text');
        const title = document.getElementById('res-title');

        if (member === 'sueda') {
            title.innerText = "Tebrikler, Ruh Eşin Sueda!";
            title.style.color = "#00d2ff";
            text.innerText = "Sueda'yı seçtin! Harika bir zevk.";
            media.innerHTML = `<img src="https://drive.google.com/thumbnail?id=1KKw3pKKjWTEv7SWZaufXLvC5R2_PA-OD&sz=w1000" class="result-media">`;
        } else {
            title.innerText = "IYY... BU MALI MI SEÇTİN?";
            title.style.color = "#ff0000";
          if(member === 'zoktay') {
            title.innerText = "IYY... BU MALI MI SEÇTİN? (ZOKTAY!)";
            text.innerText = "Zoktay... Iyy! Cidden seçe seçe bu malı mı seçtin?";
            media.innerHTML = `<video class="result-media" controls autoplay muted playsinline>
                <source src="video.mp4" type="video/mp4">
                Tarayıcınız video oynatmayı desteklemiyor.
            </video>`;
        }
            } else {
                text.innerText = "Cidden seçe seçe bu malı mı seçtin, gerçekten pes!";
                let driveId = "";
                if(member === 'mina') driveId = "1OPxkJ_MHNNmNbBVio0D4wpvVGp1yRPfk";
                else if(member === 'esin') driveId = "1teqpGwmDy1laJ4TTk1An_TW4PBR7L1vv";
                else if(member === 'lidya') driveId = "1lH3SYKhoRT-ZQ7MRT7gMiIrMzOmRJhxP";
                else if(member === 'hilal') driveId = "1P-LjNOIXAkv1s0MSd12t7S_xORDRvsGR";
                media.innerHTML = `<img src="https://drive.google.com/thumbnail?id=${driveId}&sz=w1000" class="result-media">`;
            }
        }
    }
</script>

</body>
</html>
